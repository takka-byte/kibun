<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kibun — 毎日が、木になる。</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ===== DESIGN TOKENS ===== */
:root {
  --green-50: #f0faf4;
  --green-100: #d6f0e0;
  --green-200: #a8d9b8;
  --green-400: #5cb87a;
  --green-600: #2d8a4e;
  --green-800: #1a5c32;
  --green-900: #0d3a1e;
  --bark: #8B6340;
  --bark-light: #c4956a;
  --soil: #5c3d1e;
  --sky: #e8f4fd;
  --sky-deep: #bde0f7;
  --amber: #f59e0b;
  --red: #ef4444;
  --bg: #f7faf8;
  --surface: #ffffff;
  --surface-2: #f0f5f2;
  --border: #d4e5da;
  --border-strong: #a8c9b4;
  --text: #1a2e22;
  --text-2: #4a6355;
  --text-3: #7a9888;
  --radius: 12px;
  --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans', 'Yu Gothic UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ===== LAYOUT ===== */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 260px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; padding: 20px 16px; }
.main { flex: 1; max-width: 640px; border-right: 1px solid var(--border); min-height: 100vh; }
.rightbar { width: 320px; flex-shrink: 0; padding: 20px 16px; }
@media (max-width: 1100px) { .rightbar { display: none; } }
@media (max-width: 720px) { .sidebar { display: none; } .main { max-width: 100%; border-right: none; } }

/* ===== LOGO ===== */
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; margin-bottom: 24px; }
.logo-icon { width: 36px; height: 36px; }
.logo-text { font-size: 22px; font-weight: 700; color: var(--green-600); letter-spacing: -0.5px; }
.logo-sub { font-size: 11px; color: var(--text-3); }

/* ===== NAV ===== */
.nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--radius); cursor: pointer; color: var(--text-2); font-size: 15px; transition: background 0.15s; border: none; background: none; width: 100%; text-align: left; }
.nav-item:hover, .nav-item.active { background: var(--green-50); color: var(--green-600); }
.nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
.nav-badge { background: var(--green-600); color: white; font-size: 10px; border-radius: 999px; padding: 1px 6px; margin-left: auto; }
.nav-divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
.nav-post-btn { background: var(--green-600); color: white; border: none; border-radius: var(--radius); padding: 11px 20px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; transition: background 0.15s; }
.nav-post-btn:hover { background: var(--green-800); }
.sidebar-user { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.sidebar-user-info { flex: 1; min-width: 0; }
.sidebar-user-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-user-id { font-size: 12px; color: var(--text-3); }

/* ===== HEADER ===== */
.page-header { position: sticky; top: 0; background: rgba(247,250,248,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 14px 20px; font-size: 17px; font-weight: 700; z-index: 10; display: flex; align-items: center; gap: 12px; }
.back-btn { background: none; border: none; cursor: pointer; color: var(--text-2); font-size: 20px; padding: 4px; border-radius: 50%; display: flex; }
.back-btn:hover { background: var(--surface-2); }

/* ===== AVATAR ===== */
.avatar { border-radius: 50%; object-fit: cover; background: var(--green-100); flex-shrink: 0; }
.avatar-placeholder { border-radius: 50%; background: var(--green-100); display: flex; align-items: center; justify-content: center; color: var(--green-600); font-weight: 700; flex-shrink: 0; }

/* ===== POST ===== */
.compose-area { padding: 16px 20px; border-bottom: 1px solid var(--border); }
.compose-row { display: flex; gap: 12px; }
.compose-input { flex: 1; }
.compose-textarea { width: 100%; border: none; background: none; resize: none; font-size: 17px; font-family: inherit; color: var(--text); outline: none; min-height: 80px; }
.compose-textarea::placeholder { color: var(--text-3); }
.compose-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.char-count { font-size: 13px; color: var(--text-3); }
.char-count.warn { color: var(--amber); }
.char-count.over { color: var(--red); }
.post-btn { background: var(--green-600); color: white; border: none; border-radius: 999px; padding: 8px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
.post-btn:disabled { opacity: 0.5; cursor: default; }
.post-btn:hover:not(:disabled) { background: var(--green-800); }

.post-card { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; transition: background 0.1s; }
.post-card:hover { background: var(--surface-2); }
.post-body { flex: 1; min-width: 0; }
.post-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
.post-name { font-weight: 600; font-size: 14px; color: var(--text); cursor: pointer; }
.post-name:hover { text-decoration: underline; }
.post-uid { font-size: 13px; color: var(--text-3); }
.post-time { font-size: 12px; color: var(--text-3); }
.post-content { font-size: 15px; line-height: 1.7; color: var(--text); margin-bottom: 10px; word-break: break-word; }
.post-actions { display: flex; gap: 20px; }
.post-action { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text-3); cursor: pointer; border: none; background: none; transition: color 0.15s; padding: 2px 0; }
.post-action:hover { color: var(--green-600); }
.post-action.liked { color: var(--red); }
.post-action svg { width: 16px; height: 16px; }

/* ===== VERIFIED BADGE ===== */
.verified-badge { display: inline-flex; width: 16px; height: 16px; flex-shrink: 0; }

/* ===== TREE ===== */
.tree-section { padding: 20px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 16px; }
.tree-section h3 { font-size: 14px; color: var(--text-2); margin-bottom: 12px; }
.tree-canvas { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; }
.tree-stats { display: flex; gap: 12px; margin-top: 10px; }
.tree-stat { text-align: center; flex: 1; }
.tree-stat-num { font-size: 20px; font-weight: 700; color: var(--green-600); }
.tree-stat-label { font-size: 11px; color: var(--text-3); }
.streak-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.streak-fill { height: 100%; background: linear-gradient(90deg, var(--green-400), var(--green-600)); border-radius: 2px; transition: width 0.5s; }

/* ===== PROFILE ===== */
.profile-header-img { width: 100%; height: 140px; object-fit: cover; background: var(--green-100); }
.profile-header-placeholder { width: 100%; height: 140px; background: linear-gradient(135deg, var(--green-100), var(--sky-deep)); }
.profile-info { padding: 0 20px 16px; }
.profile-avatar-row { display: flex; justify-content: space-between; align-items: flex-end; margin-top: -32px; margin-bottom: 12px; }
.profile-display-name { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.profile-uid { font-size: 14px; color: var(--text-3); margin-bottom: 8px; }
.profile-bio { font-size: 14px; color: var(--text-2); line-height: 1.6; margin-bottom: 10px; }
.profile-follow-row { display: flex; gap: 16px; font-size: 14px; color: var(--text-3); }
.profile-follow-row span { cursor: pointer; }
.profile-follow-row strong { color: var(--text); }
.follow-btn { border-radius: 999px; padding: 7px 18px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--green-600); transition: all 0.15s; }
.follow-btn.following { background: var(--green-600); color: white; }
.follow-btn.not-following { background: none; color: var(--green-600); }
.follow-btn:hover { opacity: 0.8; }

/* ===== TABS ===== */
.tabs { display: flex; border-bottom: 1px solid var(--border); }
.tab { flex: 1; text-align: center; padding: 14px; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text-3); border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab.active { color: var(--green-600); border-bottom-color: var(--green-600); }
.tab:hover { background: var(--surface-2); }

/* ===== MODAL ===== */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.modal-header { padding: 20px; border-bottom: 1px solid var(--border); font-size: 17px; font-weight: 700; display: flex; align-items: center; justify-content: space-between; }
.modal-body { padding: 20px; }
.modal-close { background: none; border: none; cursor: pointer; color: var(--text-3); font-size: 20px; line-height: 1; }

/* ===== FORMS ===== */
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
.field input, .field textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 15px; font-family: inherit; color: var(--text); background: var(--surface); outline: none; transition: border-color 0.15s; }
.field input:focus, .field textarea:focus { border-color: var(--green-400); }
.field .hint { font-size: 12px; color: var(--text-3); margin-top: 4px; }
.btn-primary { background: var(--green-600); color: white; border: none; border-radius: var(--radius); padding: 12px 20px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.15s; }
.btn-primary:hover { background: var(--green-800); }
.btn-secondary { background: none; color: var(--text-2); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 10px 20px; font-size: 14px; cursor: pointer; width: 100%; transition: all 0.15s; }
.btn-secondary:hover { border-color: var(--border-strong); }
.btn-danger { background: none; color: var(--red); border: 1.5px solid var(--red); border-radius: var(--radius); padding: 10px 20px; font-size: 14px; cursor: pointer; width: 100%; transition: all 0.15s; }
.btn-danger:hover { background: #fff0f0; }
.auth-switch { text-align: center; margin-top: 14px; font-size: 14px; color: var(--text-3); }
.auth-switch a { color: var(--green-600); cursor: pointer; text-decoration: underline; }
.error-msg { background: #fff0f0; color: var(--red); border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-bottom: 12px; }
.success-msg { background: var(--green-50); color: var(--green-800); border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-bottom: 12px; }

/* ===== NOTIFICATION ===== */
.notif-item { display: flex; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); cursor: pointer; }
.notif-item:hover { background: var(--surface-2); }
.notif-item.unread { background: var(--green-50); }
.notif-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; }
.notif-text { font-size: 14px; line-height: 1.5; color: var(--text-2); }
.notif-text strong { color: var(--text); }

/* ===== DM ===== */
.dm-list-item { display: flex; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); cursor: pointer; align-items: center; }
.dm-list-item:hover { background: var(--surface-2); }
.dm-thread { display: flex; flex-direction: column; height: calc(100vh - 60px); }
.dm-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
.dm-bubble { max-width: 70%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-break: break-word; }
.dm-bubble.mine { background: var(--green-600); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
.dm-bubble.theirs { background: var(--surface-2); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; }
.dm-input-row { display: flex; gap: 8px; padding: 12px 20px; border-top: 1px solid var(--border); }
.dm-input-row input { flex: 1; border: 1.5px solid var(--border); border-radius: 999px; padding: 10px 16px; font-size: 14px; outline: none; font-family: inherit; background: var(--surface); }
.dm-input-row input:focus { border-color: var(--green-400); }
.dm-send-btn { background: var(--green-600); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* ===== SETTINGS ===== */
.settings-section { padding: 16px 0; border-bottom: 1px solid var(--border); }
.settings-section h3 { font-size: 13px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.settings-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; font-size: 15px; }
.img-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); margin-top: 8px; }
.header-preview { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); margin-top: 8px; }

/* ===== ADMIN ===== */
.admin-panel { padding: 20px; }
.admin-panel h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.user-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.user-row .actions { margin-left: auto; display: flex; gap: 8px; }
.admin-btn { font-size: 12px; padding: 5px 10px; border-radius: 6px; cursor: pointer; border: 1px solid; }
.admin-btn.verify { border-color: var(--green-400); color: var(--green-600); background: var(--green-50); }
.admin-btn.unverify { border-color: var(--border-strong); color: var(--text-3); background: var(--surface); }
.admin-btn.del { border-color: var(--red); color: var(--red); background: #fff0f0; }

/* ===== LOADING / EMPTY ===== */
.spinner { text-align: center; padding: 40px; color: var(--text-3); font-size: 14px; }
.empty { text-align: center; padding: 60px 20px; color: var(--text-3); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty p { font-size: 14px; }

/* ===== TOAST ===== */
#toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 10px 20px; border-radius: 999px; font-size: 14px; z-index: 200; pointer-events: none; opacity: 0; transition: opacity 0.2s; white-space: nowrap; }
#toast.show { opacity: 1; }

/* ===== MOBILE BOTTOM NAV ===== */
.mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); z-index: 50; }
@media (max-width: 720px) {
  .mobile-nav { display: flex; }
  .main { padding-bottom: 60px; }
}
.mobile-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; cursor: pointer; color: var(--text-3); font-size: 10px; gap: 2px; border: none; background: none; position: relative; }
.mobile-nav-item.active, .mobile-nav-item:hover { color: var(--green-600); }
.mobile-nav-item svg { width: 22px; height: 22px; }
.mobile-badge { position: absolute; top: 6px; right: calc(50% - 16px); background: var(--red); color: white; font-size: 9px; border-radius: 999px; padding: 1px 4px; min-width: 14px; text-align: center; }

/* ===== WATER BUTTON ===== */
.water-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-3); border: 1px solid var(--border); border-radius: 999px; padding: 5px 12px; cursor: pointer; background: none; transition: all 0.15s; }
.water-btn:hover { border-color: var(--sky-deep); color: #2196F3; background: var(--sky); }

/* ===== CUSTOM DROPDOWN (select廃止・完全独自実装) ===== */
.kd-wrapper { position: relative; user-select: none; }
.kd-trigger { display: flex; align-items: center; justify-content: space-between; gap: 8px; border: 1.5px solid var(--border); border-radius: 999px; padding: 10px 16px; font-size: 15px; font-family: inherit; color: var(--text); background: var(--surface); cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
.kd-trigger:hover { border-color: var(--green-400); }
.kd-trigger.open { border-color: var(--green-400); box-shadow: 0 0 0 3px rgba(45,138,78,0.12); }
.kd-trigger-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.kd-trigger-text.placeholder { color: var(--text-3); }
.kd-arrow { width: 16px; height: 16px; color: var(--text-3); flex-shrink: 0; transition: transform 0.2s; }
.kd-trigger.open .kd-arrow { transform: rotate(180deg); }
.kd-menu { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 200; max-height: 220px; overflow-y: auto; scrollbar-width: thin; display: none; padding: 4px; }
.kd-menu.open { display: block; animation: kd-in 0.12s ease; }
@keyframes kd-in { from { opacity:0; transform:translateY(-4px) } to { opacity:1; transform:translateY(0) } }
.kd-option { padding: 10px 14px; font-size: 14px; cursor: pointer; color: var(--text); border-radius: 10px; transition: background 0.1s; }
.kd-option:hover { background: var(--green-50); color: var(--green-600); }
.kd-option.selected { background: var(--green-50); color: var(--green-600); font-weight: 600; }
.kd-option.disabled { color: var(--text-3); cursor: default; font-size: 12px; padding: 6px 14px; border-radius: 10px; }
.kd-option.disabled:hover { background: none; color: var(--text-3); }

/* ===== CUSTOM FILE INPUT ===== */
.file-input-wrapper { position: relative; }
.file-input-wrapper input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.file-input-label { display: inline-flex; align-items: center; gap: 8px; border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 14px; font-size: 14px; color: var(--text-2); background: var(--surface); cursor: pointer; transition: border-color 0.15s, background 0.15s; }
.file-input-label:hover { border-color: var(--green-400); background: var(--green-50); }
.file-input-label svg { width: 16px; height: 16px; color: var(--green-600); }

/* ===== CUSTOM CONFIRM DIALOG ===== */
#kibun-dialog-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity 0.15s; pointer-events: none; }
#kibun-dialog-overlay.show { opacity: 1; pointer-events: all; }
#kibun-dialog { background: var(--surface); border-radius: 16px; width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); overflow: hidden; transform: scale(0.95); transition: transform 0.15s; }
#kibun-dialog-overlay.show #kibun-dialog { transform: scale(1); }
#kibun-dialog-icon { font-size: 36px; text-align: center; padding: 24px 24px 8px; }
#kibun-dialog-title { font-size: 17px; font-weight: 700; text-align: center; padding: 0 24px 6px; color: var(--text); }
#kibun-dialog-msg { font-size: 14px; color: var(--text-2); text-align: center; padding: 0 24px 20px; line-height: 1.6; }
#kibun-dialog-btns { display: flex; border-top: 1px solid var(--border); }
#kibun-dialog-btns button { flex: 1; padding: 14px; font-size: 15px; font-weight: 600; border: none; background: none; cursor: pointer; transition: background 0.1s; font-family: inherit; }
#kibun-dialog-btns button:first-child { border-right: 1px solid var(--border); color: var(--text-3); }
#kibun-dialog-btns button:first-child:hover { background: var(--surface-2); }
#kibun-dialog-btns button.confirm-ok { color: var(--green-600); }
#kibun-dialog-btns button.confirm-ok:hover { background: var(--green-50); }
#kibun-dialog-btns button.confirm-danger { color: var(--red); }
#kibun-dialog-btns button.confirm-danger:hover { background: #fff0f0; }

/* ===== SETTINGS TABS ===== */
.settings-tab-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 57px; z-index: 5; overflow-x: auto; scrollbar-width: none; }
.settings-tab-bar::-webkit-scrollbar { display: none; }
.settings-tab { padding: 12px 16px; font-size: 13px; font-weight: 600; color: var(--text-3); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
.settings-tab.active { color: var(--green-600); border-bottom-color: var(--green-600); }
.settings-tab:hover { background: var(--surface-2); }
.settings-pane { display: none; padding: 0 20px 40px; }
.settings-pane.active { display: block; }
.settings-group { padding: 20px 0; border-bottom: 1px solid var(--border); }
.settings-group:last-child { border-bottom: none; }
.settings-group-title { font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; }

/* ===== RIGHTBAR ===== */
.rightbar-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
.rightbar-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
.suggest-user { display: flex; align-items: center; gap: 10px; padding: 8px 0; }

function kibunConfirm({ icon = '🌿', title, message, okLabel = 'OK', danger = false }) {
  return new Promise(resolve => {
    const overlay = document.getElementById('kibun-dialog-overlay');
    document.getElementById('kibun-dialog-icon').textContent = icon;
    document.getElementById('kibun-dialog-title').textContent = title;
    document.getElementById('kibun-dialog-msg').textContent = message;
    const okBtn = document.getElementById('kibun-dialog-ok');
    okBtn.textContent = okLabel;
    okBtn.className = danger ? 'confirm-danger' : 'confirm-ok';
    overlay.classList.add('show');
    const close = (result) => {
      overlay.classList.remove('show');
      okBtn.replaceWith(okBtn.cloneNode(true));
      document.getElementById('kibun-dialog-cancel').replaceWith(document.getElementById('kibun-dialog-cancel').cloneNode(true));
      resolve(result);
    };
    document.getElementById('kibun-dialog-ok').addEventListener('click', () => close(true));
    document.getElementById('kibun-dialog-cancel').addEventListener('click', () => close(false));
  });
}

// ===== CUSTOM DROPDOWN =====
// createDropdown(containerId, options, placeholder, selectedValue)
// options: [{value, label}]
// returns { getValue, setValue }
function createDropdown(containerId, options, placeholder, selectedValue) {
  const wrapper = document.getElementById(containerId);
  if (!wrapper) return;
  wrapper.innerHTML = '';
  wrapper.className = 'kd-wrapper';

  let current = selectedValue !== undefined && selectedValue !== null ? String(selectedValue) : '';

  const trigger = document.createElement('div');
  trigger.className = 'kd-trigger';
  const triggerText = document.createElement('span');
  triggerText.className = 'kd-trigger-text' + (current ? '' : ' placeholder');
  triggerText.textContent = current ? (options.find(o => String(o.value) === current)?.label || placeholder) : placeholder;
  const arrow = document.createElementNS('http://www.w3.org/2000/svg','svg');
  arrow.setAttribute('viewBox','0 0 24 24'); arrow.setAttribute('fill','none');
  arrow.setAttribute('stroke','currentColor'); arrow.setAttribute('stroke-width','2');
  arrow.classList.add('kd-arrow');
  arrow.innerHTML = '<polyline points="6 9 12 15 18 9"/>';
  trigger.appendChild(triggerText); trigger.appendChild(arrow);

  const menu = document.createElement('div');
  menu.className = 'kd-menu';

  options.forEach(opt => {
    const item = document.createElement('div');
    item.className = 'kd-option' + (opt.disabled ? ' disabled' : '') + (String(opt.value) === current ? ' selected' : '');
    item.textContent = opt.label;
    if (!opt.disabled) {
      item.addEventListener('click', e => {
        e.stopPropagation();
        current = String(opt.value);
        triggerText.textContent = opt.label;
        triggerText.classList.remove('placeholder');
        menu.querySelectorAll('.kd-option').forEach(el => el.classList.remove('selected'));
        item.classList.add('selected');
        close();
      });
    }
    menu.appendChild(item);
  });

  wrapper.appendChild(trigger); wrapper.appendChild(menu);

  const open = () => { trigger.classList.add('open'); menu.classList.add('open'); };
  const close = () => { trigger.classList.remove('open'); menu.classList.remove('open'); };
  trigger.addEventListener('click', e => { e.stopPropagation(); trigger.classList.contains('open') ? close() : open(); });
  document.addEventListener('click', close);

  return {
    getValue: () => current,
    setValue: (v) => {
      current = String(v);
      const opt = options.find(o => String(o.value) === current);
      if (opt) { triggerText.textContent = opt.label; triggerText.classList.remove('placeholder'); }
    }
  };
}

// ===== HASH HELPERS =====
async function hashPassword(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const uid = document.getElementById('login-uid').value.trim().toLowerCase();
  const pw = document.getElementById('login-pw').value;
  if (!uid || !pw) return showAuthError('IDとパスワードを入力してください');
  const hash = await hashPassword(pw);
  const { data } = await db.from('users').select('*').eq('id', uid).eq('password_hash', hash).single();
  if (!data) return showAuthError('IDまたはパスワードが間違っています');
  currentUser = data;
  localStorage.setItem('kibun_user', JSON.stringify(data));
  closeAuthModal();
  initApp();
  showToast('ログインしました 🌿');
}

async function doRegister() {
  const uid = document.getElementById('reg-uid').value.trim().toLowerCase();
  const name = document.getElementById('reg-name').value.trim();
  const pw = document.getElementById('reg-pw').value;
  const pw2 = document.getElementById('reg-pw2').value;
  if (!uid || !name || !pw) return showAuthError('すべての項目を入力してください');
  if (!/^[a-z0-9_-]+$/.test(uid)) return showAuthError('ユーザーIDは英数字・_・-のみ使えます');
  if (uid.length < 2) return showAuthError('ユーザーIDは2文字以上にしてください');
  if (pw.length < 8) return showAuthError('パスワードは8文字以上にしてください');
  if (pw !== pw2) return showAuthError('パスワードが一致しません');
  const { data: exists } = await db.from('users').select('id').eq('id', uid).single();
  if (exists) return showAuthError('そのIDはすでに使われています');
  const hash = await hashPassword(pw);
  const user = { id: uid, display_name: name, password_hash: hash };
  const { error } = await db.from('users').insert(user);
  if (error) return showAuthError('登録に失敗しました: ' + error.message);
  const { data } = await db.from('users').select('*').eq('id', uid).single();
  currentUser = data;
  localStorage.setItem('kibun_user', JSON.stringify(data));
  closeAuthModal();
  initApp();
  showToast('ようこそ！木を育てよう 🌱');
}

// ===== TREE SVG =====
function renderTree(level, streak, seed) {
  const lv = Math.min(Math.max(level || 1, 1), 10);
  // seedベースの疑似乱数（同じseedなら毎回同じ形）
  const rng = (() => {
    let s = (seed || 42) * 9301 + 49297;
    return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  })();
  const trunkH = 20 + lv * 3;
  const trunkW = 6 + lv;
  const leafSize = 10 + lv * 4;
  const cx = 80, cy = 140;
  const leafColor = lv < 4 ? '#a8d9b8' : lv < 7 ? '#5cb87a' : '#2d8a4e';
  const leafCount = Math.min(lv * 2, 16);
  let leaves = '';
  for (let i = 0; i < leafCount; i++) {
    const angle = (i / leafCount) * Math.PI * 2;
    const r = leafSize * (0.5 + rng() * 0.5);
    const lx = cx + Math.cos(angle) * r;
    const ly = (cy - trunkH) + Math.sin(angle) * r * 0.6;
    const ls = 8 + rng() * leafSize;
    leaves += `<ellipse cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" rx="${ls.toFixed(1)}" ry="${(ls*0.6).toFixed(1)}" fill="${leafColor}" opacity="0.85"/>`;
  }
  if (streak > 0) {
    for (let i = 0; i < Math.min(streak, 5); i++) {
      const dx = cx - 20 + i * 10, dy = cy - trunkH - leafSize + i * 5;
      leaves += `<ellipse cx="${dx}" cy="${dy}" rx="2" ry="3" fill="#bde0f7" opacity="0.7"/>`;
    }
  }
  return `<svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" width="100%" style="max-height:160px">
    <rect x="0" y="0" width="160" height="160" rx="12" fill="${lv >= 8 ? '#d6f0e0' : '#f0faf4'}"/>
    ${lv >= 5 ? `<ellipse cx="${cx}" cy="${cy+2}" rx="${trunkW+8}" ry="5" fill="#5c3d1e" opacity="0.18"/>` : ''}
    <rect x="${cx-trunkW/2}" y="${cy-trunkH}" width="${trunkW}" height="${trunkH+4}" rx="3" fill="#8B6340"/>
    ${leaves}
    <circle cx="${cx}" cy="${cy-trunkH}" r="${leafSize * 0.7}" fill="${leafColor}" opacity="0.9"/>
    ${lv >= 10 ? `<text x="${cx}" y="20" text-anchor="middle" font-size="18">🌸</text>` : ''}
  </svg>`;
}

// ===== HELPERS =====
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function timeAgo(ts) {
  const d = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (d < 60) return 'たった今';
  if (d < 3600) return Math.floor(d/60) + '分前';
  if (d < 86400) return Math.floor(d/3600) + '時間前';
  return Math.floor(d/86400) + '日前';
}

  return `<div class="avatar-placeholder" style="width:${size}px;height:${size}px;font-size:${Math.floor(size*0.4)}px">${initial}</div>`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');

}
function requireLogin(fn) {

function openPostModal() {
  requireLogin(() => {

    document.getElementById('modal-post-text').value = '';

}
function closePostModal() { document.getElementById('post-modal').style.display = 'none'; }
function updateModalCount(el) {

  cc.textContent = left;
  cc.className = 'char-count' + (left < 20 ? ' warn' : '') + (left < 0 ? ' over' : '');

async function submitPost() {
  const text = document.getElementById('modal-post-text').value.trim();
  if (!text || text.length > 280) return;
  // 1日1投稿チェック
  const today = new Date().toISOString().split('T')[0];
  if (currentUser.tree_last_post === today) {
    showToast('今日はもう投稿しました！明日また来てね 🌿'); return;
  }
  const { error } = await db.from('posts').insert({ user_id: currentUser.id, content: text });
  if (error) { showToast('投稿に失敗しました'); return; }
  await updateTree();
  closePostModal();
  showToast('投稿しました 🌱');
  if (currentPage === 'home' || currentPage === 'profile') navigate(currentPage, currentPageParam);
}

async function updateTree() {
  const today = new Date().toISOString().split('T')[0];
  const last = currentUser.tree_last_post;
  let streak = currentUser.tree_streak || 0;
  let total = (currentUser.tree_total_posts || 0) + 1;
  if (last === today) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  streak = (last === yesterday) ? streak + 1 : 1;
  const level = Math.min(Math.floor(total / 10) + 1, 10);
  // 初回のみseedを生成して固定
  const seed = currentUser.tree_seed || Math.floor(Math.random() * 99999) + 1;
  const update = { tree_last_post: today, tree_streak: streak, tree_total_posts: total, tree_level: level, tree_seed: seed };
  await db.from('users').update(update).eq('id', currentUser.id);
  currentUser = { ...currentUser, ...update };
  localStorage.setItem('kibun_user', JSON.stringify(currentUser));
}

let timelinePage = 0;
let timelineAllLoaded = false;
let timelineLoading = false;
const TIMELINE_PAGE_SIZE = 20;

async function loadTimeline(reset = false) {
  if (timelineLoading || timelineAllLoaded) return;
  timelineLoading = true;
  const el = document.getElementById('home-timeline');
  if (!el) { timelineLoading = false; return; }
  if (reset) {
    el.innerHTML = '<div class="spinner">読み込み中...</div>';
    timelinePage = 0;
    timelineAllLoaded = false;
  }

  const from = timelinePage * TIMELINE_PAGE_SIZE;
  const to = from + TIMELINE_PAGE_SIZE - 1;
  const { data: posts, error } = await db.from('posts')
    .select('*, user:users!posts_user_id_fkey(id,display_name,avatar_url,is_verified,tree_level)')
    .order('created_at', { ascending: false })
    .range(from, to);

  if (reset) el.innerHTML = '';

  if (error || !posts || posts.length === 0) {
    if (timelinePage === 0) {
      if (error) {
        el.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>読み込みに失敗しました<br><span style="font-size:12px;color:var(--text-3)">${esc(error.message)}</span></p></div>`;
      } else {
        el.innerHTML = '<div class="empty"><div class="empty-icon">🌿</div><p>まだ投稿がありません。</p></div>';
      }
    }
    timelineAllLoaded = true;
    timelineLoading = false;
    return;
  }

  if (posts.length < TIMELINE_PAGE_SIZE) timelineAllLoaded = true;

  // いいね済みチェック
  let likedSet = {};
  if (currentUser) {
    const { data: likeData } = await db.from('likes').select('post_id').eq('user_id', currentUser.id).in('post_id', posts.map(p => p.id));
    (likeData || []).forEach(l => likedSet[l.post_id] = true);
  }
  // いいね数を一括取得
  const { data: likeCounts } = await db.from('likes').select('post_id').in('post_id', posts.map(p => p.id));
  const countMap = {};
  (likeCounts || []).forEach(l => { countMap[l.post_id] = (countMap[l.post_id] || 0) + 1; });

  el.insertAdjacentHTML('beforeend', posts.map(p => postCardHTML(p, likedSet[p.id], countMap[p.id] || 0)).join(''));
  timelinePage++;
  timelineLoading = false;
}

function setupTimelineScroll() {
  const sentinel = document.getElementById('timeline-sentinel');
  if (!sentinel) return;
  const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) loadTimeline();
  }, { rootMargin: '200px' });
  observer.observe(sentinel);
}

// ===== LIKE COUNTS (profile pages) =====
async function enrichWithLikeCounts(posts) {
  if (!posts || posts.length === 0) return posts;
  const { data: likeCounts } = await db.from('likes').select('post_id').in('post_id', posts.map(p => p.id));
  const countMap = {};
  (likeCounts || []).forEach(l => { countMap[l.post_id] = (countMap[l.post_id] || 0) + 1; });
  return posts.map(p => ({ ...p, _likeCount: countMap[p.id] || 0 }));
}

async function toggleLike(postId, postUserId, btn) {
  requireLogin(async () => {
    const { data: existing } = await db.from('likes').select('*').eq('user_id', currentUser.id).eq('post_id', postId).single();
    const countEl = document.getElementById('like-count-' + postId);
    let c = parseInt(countEl.textContent) || 0;
    if (existing) {
      await db.from('likes').delete().eq('user_id', currentUser.id).eq('post_id', postId);
      btn.classList.remove('liked');
      btn.querySelector('svg').setAttribute('fill', 'none');
      countEl.textContent = Math.max(c - 1, 0);
    } else {
      await db.from('likes').insert({ user_id: currentUser.id, post_id: postId });
      btn.classList.add('liked');
      btn.querySelector('svg').setAttribute('fill', 'currentColor');
      countEl.textContent = c + 1;
      if (postUserId !== currentUser.id) {
        await db.from('notifications').insert({ user_id: postUserId, actor_id: currentUser.id, type: 'like', post_id: postId });
      }
    }
  });
}

      btn.setAttribute('onclick', `toggleFollow('${targetId}', true)`);
      await db.from('notifications').insert({ user_id: targetId, actor_id: currentUser.id, type: 'follow' });
    }
  });
}

async function toggleBlock(targetId, currentlyBlocked) {
  requireLogin(async () => {
    if (currentlyBlocked) {
      await db.from('blocks').delete().eq('blocker_id', currentUser.id).eq('blocked_id', targetId);
      showToast('ブロックを解除しました');
    } else {
      const ok = await kibunConfirm({ icon: '🚫', title: 'ブロックしますか？', message: 'このユーザーをブロックします。お互いの投稿が見えなくなります。', okLabel: 'ブロックする', danger: true });

async function renderFollowList(uid, type) {
  const main = document.getElementById('main-content');
  main.innerHTML = `<div class="page-header"><button class="back-btn" onclick="navigate('profile','${esc(uid)}')">←</button>${type === 'followers' ? 'フォロワー' : 'フォロー中'}</div><div class="spinner">読み込み中...</div>`;
  let userIds = [];
  if (type === 'followers') {
    const { data } = await db.from('follows').select('follower_id').eq('following_id', uid);
    userIds = (data || []).map(f => f.follower_id);
  } else {
    const { data } = await db.from('follows').select('following_id').eq('follower_id', uid);
    userIds = (data || []).map(f => f.following_id);
  }
  if (userIds.length === 0) { main.innerHTML += '<div class="empty"><p>まだいません</p></div>'; return; }
  const { data: users } = await db.from('users').select('*').in('id', userIds);
  main.innerHTML = `<div class="page-header"><button class="back-btn" onclick="navigate('profile','${esc(uid)}')">←</button>${type === 'followers' ? 'フォロワー' : 'フォロー中'}</div>` +
    (users || []).map(u => `<div class="post-card" onclick="navigate('profile','${esc(u.id)}')">
      ${avatarHTML(u, 44)}
      <div><div style="font-weight:600;display:flex;align-items:center;gap:4px">${esc(u.display_name)}${u.is_verified ? verifiedBadge() : ''}</div><div style="font-size:13px;color:var(--text-3)">@${esc(u.id)}</div></div>
    </div>`).join('');
}

// ===== NOTIFICATIONS =====
async function renderNotifications() {
  if (!currentUser) { document.getElementById('main-content').innerHTML = '<div class="empty"><p>ログインが必要です</p></div>'; return; }
  const main = document.getElementById('main-content');
  main.innerHTML = `<div class="page-header">通知</div><div class="spinner">読み込み中...</div>`;
  const { data: notifs } = await db.from('notifications').select('*, actor:users!actor_id(id,display_name,avatar_url,is_verified)').eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(50);
  // 既読にする
  await db.from('notifications').update({ is_read: true }).eq('user_id', currentUser.id).eq('is_read', false);
  updateNotifBadge(0);
  if (!notifs || notifs.length === 0) { main.innerHTML = '<div class="page-header">通知</div><div class="empty"><div class="empty-icon">🔔</div><p>通知がありません</p></div>'; return; }
  const icons = { like: '💚', follow: '🌿', reply: '💬', water: '💧' };
  const labels = { like: 'があなたの投稿にいいねしました', follow: 'があなたをフォローしました', reply: 'が返信しました', water: 'があなたの木に水をあげました' };
  main.innerHTML = `<div class="page-header">通知</div>` + notifs.map(n => `
    <div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="navigate('profile','${esc(n.actor?.id)}')">
      <div class="notif-icon">${icons[n.type] || '📣'}</div>
      <div>
        <div class="notif-text"><strong>${esc(n.actor?.display_name)}</strong>${labels[n.type] || ''}</div>
        <div style="font-size:12px;color:var(--text-3);margin-top:2px">${timeAgo(n.created_at)}</div>
      </div>
    </div>
  `).join('');
}

function startNotifPolling() {
  checkNotifs();
  notifInterval = setInterval(checkNotifs, 30000);
}
async function checkNotifs() {
  if (!currentUser) return;
  const { count } = await db.from('notifications').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id).eq('is_read', false);
  updateNotifBadge(count || 0);
  // DM未読
  const { count: dmCount } = await db.from('dm_messages').select('*', { count: 'exact', head: true }).eq('is_read', false).neq('sender_id', currentUser.id);
  updateDMBadge(dmCount || 0);
}
function updateNotifBadge(n) {
  ['notif-badge','mnotif-badge'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (n > 0) { el.textContent = n > 99 ? '99+' : n; el.style.display = ''; }
    else el.style.display = 'none';
  });
}
function updateDMBadge(n) {
  const el = document.getElementById('dm-badge');
  if (!el) return;
  if (n > 0) { el.textContent = n; el.style.display = ''; }
  else el.style.display = 'none';
}

// ===== DM =====
async function renderDM() {
  if (!currentUser) { document.getElementById('main-content').innerHTML = '<div class="empty"><p>ログインが必要です</p></div>'; return; }
  const main = document.getElementById('main-content');
  main.innerHTML = `<div class="page-header">DM</div><div class="spinner">読み込み中...</div>`;
  const { data: threads } = await db.from('dm_threads').select('*, user1:users!user1_id(id,display_name,avatar_url,is_verified), user2:users!user2_id(id,display_name,avatar_url,is_verified)').or(`user1_id.eq.${currentUser.id},user2_id.eq.${currentUser.id}`).order('created_at', { ascending: false });
  if (!threads || threads.length === 0) { main.innerHTML = '<div class="page-header">DM</div><div class="empty"><div class="empty-icon">💬</div><p>DMがありません<br>誰かのプロフィールからDMを送れます</p></div>'; return; }
  main.innerHTML = `<div class="page-header">DM</div>` + threads.map(t => {
    const other = t.user1_id === currentUser.id ? t.user2 : t.user1;
    return `<div class="dm-list-item" onclick="navigate('dm-thread','${esc(t.id)}|${esc(other.id)}')">
      ${avatarHTML(other, 44)}
      <div><div style="font-weight:600;font-size:14px;display:flex;align-items:center;gap:4px">${esc(other.display_name)}${other.is_verified ? verifiedBadge() : ''}</div><div style="font-size:12px;color:var(--text-3)">@${esc(other.id)}</div></div>
    </div>`;
  }).join('');
}

async function openDMTo(toId) {
  requireLogin(async () => {
    // スレッドを取得 or 作成
    const uid1 = currentUser.id < toId ? currentUser.id : toId;
    const uid2 = currentUser.id < toId ? toId : currentUser.id;
    let { data: thread } = await db.from('dm_threads').select('id').eq('user1_id', uid1).eq('user2_id', uid2).single();
    if (!thread) {
      const { data: newThread } = await db.from('dm_threads').insert({ user1_id: uid1, user2_id: uid2 }).select().single();
      thread = newThread;
    }
    navigate('dm-thread', thread.id + '|' + toId);
  });
}

async function renderDMThread(param) {
  const [threadId, otherId] = param.split('|');
  const { data: other } = await db.from('users').select('*').eq('id', otherId).single();
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="page-header"><button class="back-btn" onclick="navigate('dm')">←</button>${avatarHTML(other || {}, 28)} ${esc(other?.display_name)}</div>
    <div class="dm-thread">
      <div class="dm-messages" id="dm-msgs"><div class="spinner">読み込み中...</div></div>
      <div class="dm-input-row">
        <input id="dm-input" placeholder="メッセージを入力..." maxlength="1000" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendDM('${esc(threadId)}','${esc(otherId)}')}">
        <button class="dm-send-btn" onclick="sendDM('${esc(threadId)}','${esc(otherId)}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" width="18" height="18"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  `;
  loadDMMessages(threadId);
}

async function loadDMMessages(threadId) {
  const { data: msgs } = await db.from('dm_messages').select('*').eq('thread_id', threadId).order('created_at', { ascending: true }).limit(100);
  await db.from('dm_messages').update({ is_read: true }).eq('thread_id', threadId).neq('sender_id', currentUser.id);
  const el = document.getElementById('dm-msgs');
  if (!el) return;
  if (!msgs || msgs.length === 0) { el.innerHTML = '<div class="empty"><p>メッセージを送ってみよう</p></div>'; return; }
  el.innerHTML = msgs.map(m => `
    <div style="display:flex;flex-direction:column;align-items:${m.sender_id === currentUser.id ? 'flex-end' : 'flex-start'}">
      <div class="dm-bubble ${m.sender_id === currentUser.id ? 'mine' : 'theirs'}">${esc(m.content)}</div>
      <div style="font-size:11px;color:var(--text-3);margin-top:2px;padding:0 4px">${timeAgo(m.created_at)}</div>
    </div>
  `).join('');
  el.scrollTop = el.scrollHeight;
}

async function sendDM(threadId, otherId) {
  const input = document.getElementById('dm-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  await db.from('dm_messages').insert({ thread_id: threadId, sender_id: currentUser.id, content: text });
  await db.from('notifications').insert({ user_id: otherId, actor_id: currentUser.id, type: 'reply' });
  loadDMMessages(threadId);
}

function switchSettingsTab(tabId, btn) {
  document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.settings-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-' + tabId).classList.add('active');
}

async function loadBlockList() {
  const el = document.getElementById('block-list');
  if (!el) return;
  const { data: blocks } = await db.from('blocks').select('blocked_id').eq('blocker_id', currentUser.id);
  if (!blocks || blocks.length === 0) { el.innerHTML = '<div style="font-size:14px;color:var(--text-3);padding:8px 0">ブロック中のユーザーはいません</div>'; return; }
  const { data: users } = await db.from('users').select('id,display_name,avatar_url,is_verified').in('id', blocks.map(b => b.blocked_id));
  el.innerHTML = (users || []).map(u => `

async function unblockUser(uid, btn) {
  await db.from('blocks').delete().eq('blocker_id', currentUser.id).eq('blocked_id', uid);
  btn.closest('div[style]').remove();
  showToast('ブロックを解除しました');
  const el = document.getElementById('block-list');
  if (el && el.querySelectorAll('div[style]').length === 0) el.innerHTML = '<div style="font-size:14px;color:var(--text-3);padding:8px 0">ブロック中のユーザーはいません</div>';
}

function previewImage(input, previewId) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const el = document.getElementById(previewId);
    el.outerHTML = `<img src="${e.target.result}" class="${previewId === 'avatar-preview' ? 'img-preview' : 'header-preview'}" id="${previewId}">`;
  };
  reader.readAsDataURL(file);
}

async function uploadImage(file, bucket) {
  const ext = file.name.split('.').pop();
  const path = `${currentUser.id}_${Date.now()}.${ext}`;
  const { error } = await db.storage.from(bucket).upload(path, file, { upsert: true });
  if (error) throw error;
  const { data } = db.storage.from(bucket).getPublicUrl(path);
  return data.publicUrl;
}

async function saveProfile() {
  const name = document.getElementById('set-name').value.trim();
  const bio = document.getElementById('set-bio').value.trim();
  if (!name) { showToast('表示名を入力してください'); return; }
  const birthYear = parseInt(window._ddYear?.getValue()) || null;
  const birthMonth = parseInt(window._ddMonth?.getValue()) || null;
  const birthDay = parseInt(document.getElementById('set-birth-day').value) || null;
  if (birthDay && (birthDay < 1 || birthDay > 31)) { showToast('日は1〜31で入力してください'); return; }
  const update = { display_name: name, bio, birth_year: birthYear, birth_month: birthMonth, birth_day: birthDay };
  const avatarFile = document.getElementById('avatar-file').files[0];
  const headerFile = document.getElementById('header-file').files[0];
  try {
    if (avatarFile) update.avatar_url = await uploadImage(avatarFile, 'avatars');
    if (headerFile) update.header_url = await uploadImage(headerFile, 'headers');
  } catch(e) { showToast('画像のアップロードに失敗しました'); return; }
  await db.from('users').update(update).eq('id', currentUser.id);
  currentUser = { ...currentUser, ...update };
  localStorage.setItem('kibun_user', JSON.stringify(currentUser));
  renderSidebarUser();
  showToast('プロフィールを更新しました ✓');
}

async function changePassword() {
  const cur = document.getElementById('pw-current').value;
  const nw = document.getElementById('pw-new').value;
  const nw2 = document.getElementById('pw-new2').value;
  if (!cur || !nw || !nw2) { showToast('すべて入力してください'); return; }
  if (nw.length < 8) { showToast('8文字以上にしてください'); return; }
  if (nw !== nw2) { showToast('新しいパスワードが一致しません'); return; }
  const curHash = await hashPassword(cur);
  const { data } = await db.from('users').select('id').eq('id', currentUser.id).eq('password_hash', curHash).single();
  if (!data) { showToast('現在のパスワードが違います'); return; }
  const newHash = await hashPassword(nw);
  await db.from('users').update({ password_hash: newHash }).eq('id', currentUser.id);
  showToast('パスワードを変更しました ✓');
}

async function deleteAccount() {
  const ok1 = await kibunConfirm({ icon: '⚠️', title: 'アカウントを削除しますか？', message: '投稿・フォロー情報がすべて削除されます。この操作は取り消せません。', okLabel: '削除する', danger: true });
  if (!ok1) return;
  const ok2 = await kibunConfirm({ icon: '🌳', title: '本当によろしいですか？', message: 'あなたの木も消えてしまいます。本当に削除しますか？', okLabel: '今すぐ削除', danger: true });
  if (!ok2) return;
  await db.from('users').delete().eq('id', currentUser.id);
  logout();
  showToast('アカウントを削除しました');
}

  <div id="admin-user-search" style="margin-bottom:16px">
    <input type="text" id="admin-search-input" placeholder="ユーザーIDまたは名前で検索..." style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:15px;outline:none" oninput="adminSearch(this.value)">
  </div>
  <div id="admin-user-list"><div class="spinner">読み込み中...</div></div></div>`;
  await adminSearch('');
}

async function adminSearch(q) {
  let query = db.from('users').select('*').order('created_at', { ascending: false }).limit(50);
  if (q) query = query.or(`id.ilike.%${q}%,display_name.ilike.%${q}%`);
  const { data: users } = await query;
  const el = document.getElementById('admin-user-list');
  if (!users || users.length === 0) { el.innerHTML = '<div class="empty"><p>ユーザーが見つかりません</p></div>'; return; }
  el.innerHTML = users.map(u => `
    <div class="user-row">
      ${avatarHTML(u, 36)}
      <div>
        <div style="font-size:14px;font-weight:600;display:flex;align-items:center;gap:4px">${esc(u.display_name)}${u.is_verified ? verifiedBadge() : ''}</div>
        <div style="font-size:12px;color:var(--text-3)">@${esc(u.id)} · Lv.${u.tree_level} · ${u.tree_total_posts}投稿</div>
      </div>
      <div class="actions">
        <button class="admin-btn ${u.is_verified ? 'unverify' : 'verify'}" onclick="adminToggleVerify('${esc(u.id)}',${u.is_verified})">${u.is_verified ? '認証解除' : '認証付与'}</button>
        ${u.id !== 'admin' ? `<button class="admin-btn del" onclick="adminDeleteUser('${esc(u.id)}')">削除</button>` : ''}
      </div>
    </div>
  `).join('');
}

async function adminToggleVerify(uid, current) {
  await db.from('users').update({ is_verified: !current }).eq('id', uid);
  showToast(current ? '認証を解除しました' : '認証バッジを付与しました ✓');
  await adminSearch(document.getElementById('admin-search-input')?.value || '');
}

async function adminDeleteUser(uid) {
  const ok = await kibunConfirm({ icon: '🛡️', title: 'ユーザーを削除', message: `@${uid} を強制削除します。この操作は取り消せません。`, okLabel: '削除する', danger: true });
  if (!ok) return;
  await db.from('users').delete().eq('id', uid);
  showToast('ユーザーを削除しました');
  await adminSearch(document.getElementById('admin-search-input')?.value || '');
}

// ===== RIGHTBAR =====
async function renderRightbar() {
  const el = document.getElementById('rightbar');
  if (!el) return;
  // 木ランキング
  const { data: top } = await db.from('users').select('id,display_name,avatar_url,is_verified,tree_level,tree_streak').order('tree_level', { ascending: false }).order('tree_streak', { ascending: false }).limit(5);
  let suggestHTML = '';
  if (currentUser) {
    const { data: follows } = await db.from('follows').select('following_id').eq('follower_id', currentUser.id);
    const followingIds = [(follows || []).map(f => f.following_id), currentUser.id].flat();
    const { data: suggest } = await db.from('users').select('id,display_name,avatar_url,is_verified').not('id', 'in', `(${followingIds.map(i => `"${i}"`).join(',')})`).limit(5);
    if (suggest && suggest.length) {
      suggestHTML = `<div class="rightbar-card">
        <h3>おすすめユーザー</h3>
        ${suggest.map(u => `<div class="suggest-user">
          <div onclick="navigate('profile','${esc(u.id)}')" style="cursor:pointer">${avatarHTML(u, 36)}</div>
          <div class="suggest-user-info" onclick="navigate('profile','${esc(u.id)}')" style="cursor:pointer">
            <div class="suggest-name">${esc(u.display_name)}${u.is_verified ? verifiedBadge() : ''}</div>
            <div class="suggest-id">@${esc(u.id)}</div>
          </div>
          <button class="mini-follow-btn" onclick="quickFollow('${esc(u.id)}',this)">フォロー</button>
        </div>`).join('')}
      </div>`;
    }
  }
  el.innerHTML = `
    ${suggestHTML}
    <div class="rightbar-card">
      <h3>🏆 木ランキング</h3>
      ${(top || []).map((u, i) => `<div class="suggest-user">
        <span style="font-size:16px;font-weight:700;color:${i===0?'#f59e0b':i===1?'#9ca3af':i===2?'#b45309':'var(--text-3)'}; min-width:20px">${i+1}</span>
        <div onclick="navigate('profile','${esc(u.id)}')" style="cursor:pointer">${avatarHTML(u, 32)}</div>
        <div class="suggest-user-info" onclick="navigate('profile','${esc(u.id)}')" style="cursor:pointer">
          <div class="suggest-name" style="font-size:13px">${esc(u.display_name)}${u.is_verified?verifiedBadge():''}</div>
          <div class="suggest-id">Lv.${u.tree_level} · 🔥${u.tree_streak}日</div>
        </div>
      </div>`).join('')}
    </div>
    <div style="font-size:12px;color:var(--text-3);padding:8px 0">Kibun — 毎日が、木になる。</div>
  `;
}

async function quickFollow(uid, btn) {
  requireLogin(async () => {
    await db.from('follows').insert({ follower_id: currentUser.id, following_id: uid });
    await db.from('notifications').insert({ user_id: uid, actor_id: currentUser.id, type: 'follow' });
    btn.textContent = 'フォロー中';
    btn.disabled = true;
    showToast('フォローしました 🌿');
  });
}

function updateInlineCount() {}
</script>
